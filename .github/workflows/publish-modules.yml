name: publish-modules

# Commit-driven module publishing (Lerna / semantic-release model).
#
# You do NOT tag by hand. Merge Conventional-Commit PRs to main and CI will,
# per module, compute the next semantic version from the commits that touched
# that module's directory, publish it to Terramantle, and push the git tag
# <module-dir>@<version> (e.g. eks-cluster-aws@1.2.3).
#
#   feat:            → minor      fix: / perf:     → patch
#   <type>! / BREAKING CHANGE → major              docs/ci/chore/… → no release
#
# semantic-release pushes the tag in core BEFORE the publish step and does not
# roll it back on failure. The publish step (.github/scripts/publish-to-terramantle.sh)
# is therefore idempotent and self-healing; a stuck tag can be reconciled with
# the manual `reconcile` workflow.
#
# Two GitHub tokens are used:
#   - OIDC token (id-token: write) → bearer for the PUT to Terramantle. The org
#     must trust  repo:terramantle/modules-sample-mono-repo  under VCS Trust.
#   - GITHUB_TOKEN (contents: write) → semantic-release pushes the git tag.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release mid-flight

env:
  # The only value to change when you fork this repo: your Terramantle org slug.
  TM_ORG: acme-demo
  TM_REGISTRY: https://registry.terramantle.dev

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # semantic-release pushes tags
      id-token: write   # mint the OIDC token for publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # semantic-release needs full history + tags
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install release tooling
        run: npm ci

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # GitHub OIDC token → bearer for publishing to Terramantle. No stored
      # secrets. The registry verifies this JWT against GitHub's JWKS and matches
      # its `sub` to a VCS Trust subject in your org.
      - name: Get GitHub Actions OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken(process.env.TM_REGISTRY)
            core.setSecret(token)
            core.setOutput('token', token)

      # Run semantic-release once per module (scoped to each module's directory
      # by the semantic-release-monorepo wrapper). scripts/release.mjs loops the
      # modules sequentially so tag pushes don't race within a single run.
      - name: Release changed modules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TM_TOKEN: ${{ steps.oidc.outputs.token }}
        run: node scripts/release.mjs
